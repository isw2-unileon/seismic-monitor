name: Go Continuous Integration

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Build, Lint and Test
    runs-on: ubuntu-latest

    services:
      postgis:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: seismic_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Golang
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run Database Migrations
        env:
          # PGPASSWORD is a standard environment variable that psql reads automatically
          PGPASSWORD: testpassword
        run: |
          psql -h localhost -U testuser -d seismic_test -f ./backend/migrations/000001_init_schema.up.sql

      # Execution of linter using .golangci.yml
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ./backend 

      - name: Install Dependencies
        working-directory: ./backend
        run: go mod download

      - name: Run Unit and Integration Tests
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: testuser
          DB_PASSWORD: testpassword
          DB_NAME: seismic_test
        run: go test -v -race -cover ./...
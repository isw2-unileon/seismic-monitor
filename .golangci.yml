run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - errcheck
    - errorlint
    - staticcheck
    - govet
    - gocritic
    - revive
    - gocyclo
    - gocognit
    - funlen
    - unconvert
    - ineffassign
    - unused
    - unparam
    - dupl
    - gosec
    - nolintlint
    - misspell

linters-settings:
  gocyclo:
    min-complexity: 15
  gocognit:
    min-complexity: 20
  funlen:
    lines: -1
    statements: 50
  dupl:
    threshold: 100
  gocritic:
    enabled-checks:
      - boolExprSimplify
      - builtinShadow
      - commentedOutCode
      - deferInLoop
      - nilValReturn
      - regexpSimplify
      - unnecessaryBlock
      - unnecessaryDefer
      - weakCond
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: error-naming
      - name: error-return
      - name: error-strings
      - name: errorf
      - name: exported
      - name: indent-error-flow
      - name: receiver-naming
      - name: time-naming
      - name: unexported-naming
      - name: var-declaration
      - name: var-naming

issues:
  max-same-issues: 0
  max-issues-per-linter: 0
  exclude-rules:
    - path: "_test\\.go$"
      linters:
        - dupl
        - funlen
        - gosec
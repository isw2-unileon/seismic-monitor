server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip para comprimir los archivos enviados al cliente
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        # Solución estricta para el enrutador de Vue (SPA)
        try_files $uri $uri/ /index.html;
    }

    # Proxy para el backend en producción
    location /api/ {
        # Usamos host.docker.internal para alcanzar el backend que corre en el host (Droplet)
        proxy_pass http://host.docker.internal:8081/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Caché estricta para archivos estáticos inmutables (rendimiento)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}